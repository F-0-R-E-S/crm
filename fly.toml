# fly.toml app configuration file generated for crm-node on 2026-04-20T01:47:58+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'crm-node'
primary_region = 'fra'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'
  seed_command = 'tsx prisma/seed.ts'

[processes]
  app = 'pnpm run start'
  worker = 'pnpm run worker'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  processes = ['app']
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[vm]]
  processes = ['worker']
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
