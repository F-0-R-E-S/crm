openapi: 3.0.0
info:
  version: 1.0.0
  title: GambChamp CRM API
  description: |
    Lead distribution platform public API.
    All intake and routing endpoints require a Bearer api key.

    ## Sandbox
    Toggle `isSandbox: true` on any api key (dashboard → settings → api keys) — requests continue
    to hit the same URLs but responses become deterministic mocks based on the `external_lead_id`
    prefix. See `GET /api/v1/errors` for the mock outcome catalog.

    Interactive docs: [/docs/api](/docs/api).
servers:
  - url: https://api.gambchamp.example.com
    description: production
  - url: https://sandbox.gambchamp.example.com
    description: sandbox
tags:
  - name: Intake
    description: Lead intake — single + bulk + async job status.
  - name: Routing
    description: Flow simulation + dry-run.
  - name: Schema
    description: Schema registry + error catalog (self-discovery).
  - name: Operations
    description: Health + metrics.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: api-key
  schemas:
    LeadCreate:
      type: object
      required: [external_lead_id, first_name, last_name, email, phone, country]
      properties:
        external_lead_id: { type: string, maxLength: 120 }
        first_name: { type: string }
        last_name: { type: string }
        email: { type: string, format: email }
        phone: { type: string, description: E.164 format recommended }
        country: { type: string, minLength: 2, maxLength: 2 }
        ip: { type: string }
        sub_id: { type: string }
        event_ts: { type: string, format: date-time }
        landing_url: { type: string, format: uri }
        utm_source: { type: string }
        utm_medium: { type: string }
        utm_campaign: { type: string }
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            field: { type: string }
            trace_id: { type: string }
paths:
  /api/v1/leads:
    post:
      tags: [Intake]
      summary: Submit a single lead
      security: [{ bearerAuth: [] }]
      parameters:
        - in: header
          name: x-api-version
          required: true
          schema: { type: string, example: "2026-01" }
        - in: header
          name: x-idempotency-key
          required: false
          schema: { type: string }
        - in: header
          name: x-trace-id
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LeadCreate" }
      responses:
        "202":
          description: Accepted; async processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  trace_id: { type: string }
                  lead_id: { type: string }
                  status: { type: string, example: received }
        "401": { description: invalid api key, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: ip not allowed or sandbox mismatch, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "409": { description: idempotency conflict, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "422": { description: validation error or fraud auto-reject, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /api/v1/leads/bulk:
    post:
      tags: [Intake]
      summary: Submit a batch of leads (sync ≤50, async >50)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: header
          name: x-api-version
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                leads:
                  type: array
                  items: { $ref: "#/components/schemas/LeadCreate" }
      responses:
        "202": { description: queued async job — returns job_id }
        "207": { description: multi-status — per-lead results for sync batches }
  /api/v1/leads/bulk/{jobId}:
    get:
      tags: [Intake]
      summary: Get bulk job status
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: current status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  completed: { type: integer }
                  failed: { type: integer }
                  total: { type: integer }
  /api/v1/routing/simulate:
    post:
      tags: [Routing]
      summary: Dry-run the routing engine for a lead or batch
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                flow_id: { type: string }
                lead:
                  type: object
                  properties:
                    affiliate_id: { type: string }
                    geo: { type: string }
                leads:
                  type: array
                  items: { type: object }
      responses:
        "200": { description: sync decision (single or small batch) }
        "202": { description: queued async batch — returns job_id }
  /api/v1/routing/simulate/{jobId}:
    get:
      tags: [Routing]
      summary: Get routing simulate job result
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: string }
      responses:
        "200": { description: results }
  /api/v1/schema/leads:
    get:
      tags: [Schema]
      summary: Discover the JSON schema for a schema version
      parameters:
        - in: query
          name: version
          required: false
          schema: { type: string, example: "2026-01" }
      responses:
        "200": { description: schema document }
  /api/v1/errors:
    get:
      tags: [Schema]
      summary: Error + sandbox-outcome catalog
      responses:
        "200": { description: catalog }
  /api/v1/health:
    get:
      tags: [Operations]
      summary: Health check
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok, degraded] }
                  db: { type: string }
                  redis: { type: string }
                  queue:
                    type: object
                    properties:
                      pending: { type: integer }
                      failed_last_hour: { type: integer }
                  version: { type: string }
        "503": { description: degraded }
  /api/v1/metrics/summary:
    get:
      tags: [Operations]
      summary: 60s rolling counters + queue depth (ADMIN session required)
      responses:
        "200":
          description: counters
          content:
            application/json:
              schema:
                type: object
                properties:
                  window_seconds: { type: integer }
                  leads_received: { type: integer }
                  leads_pushed: { type: integer }
                  fraud_hit: { type: integer }
                  broker_down_count: { type: integer }
                  manual_queue_depth: { type: integer }
        "401": { description: unauthorized }
        "403": { description: forbidden }
