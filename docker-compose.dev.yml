# Development override — replaces the nginx web service with Vite dev server (HMR)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Or via Make:
#   make dev
#
# The Vite dev server is available at http://localhost:5173
# API calls (/api/*) are proxied to api-gateway:8080 inside Docker.

version: "3.9"

services:
  web:
    # Override the production nginx build with a Node dev image
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    working_dir: /app
    # Install deps then start Vite dev server.
    # npm ci only downloads packages when node_modules volume is empty (first start).
    command: sh -c "npm ci && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      # Prevent host node_modules from bleeding into the container
      - web_node_modules:/app/node_modules
    environment:
      # Proxy target for Vite: points to the api-gateway container name
      VITE_PROXY_TARGET: "http://api-gateway:8080"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  web_node_modules:
