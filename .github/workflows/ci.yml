name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.56

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gambchamp_test
          POSTGRES_USER: gambchamp
          POSTGRES_PASSWORD: gambchamp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        env:
          DB_URL: postgres://gambchamp:gambchamp_test@localhost:5432/gambchamp_test?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.out

  build:
    name: Build Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - lead-intake-svc
          - routing-engine-svc
          - broker-adapter-svc
          - fraud-engine-svc
          - status-sync-svc
          - autologin-svc
          - uad-svc
          - notification-svc
          - api-gateway
          - identity-svc
          - analytics-svc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build ${{ matrix.service }}
        run: |
          CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/${{ matrix.service }} ./services/${{ matrix.service }}/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  e2e:
    name: E2E Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gambchamp_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Start NATS with JetStream
        run: |
          docker run -d --name nats -p 4222:4222 -p 8222:8222 nats:2.10-alpine -js
          for i in $(seq 1 30); do wget -q -O /dev/null http://localhost:8222/healthz 2>/dev/null && break || sleep 1; done
      - name: Run E2E tests
        env:
          E2E_PG_DSN: postgres://postgres:postgres@localhost:5432/gambchamp_e2e?sslmode=disable
          E2E_REDIS_URL: redis://localhost:6379/15
          E2E_NATS_URL: nats://localhost:4222
        run: go test -v -timeout 180s -tags=e2e -count=1 ./tests/e2e/...

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - lead-intake-svc
          - routing-engine-svc
          - broker-adapter-svc
          - fraud-engine-svc
          - status-sync-svc
          - autologin-svc
          - uad-svc
          - notification-svc
          - api-gateway
          - identity-svc
          - analytics-svc
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          docker build --build-arg SERVICE=${{ matrix.service }} -t gambchamp/${{ matrix.service }}:${{ github.sha }} .
