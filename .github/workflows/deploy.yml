name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'Transcript_videos' \
            --exclude 'videos' \
            --exclude 'product_backlog' \
            --exclude '.DS_Store' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '.context' \
            --exclude 'coverage.out' \
            --exclude 'bin/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/gambchamp/

      - name: Build and restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 20m
          script_stop: true
          script: |
            set -e
            cd /opt/gambchamp

            echo "==> Building Docker images..."
            docker compose -f docker-compose.deploy.yml --env-file .env build --parallel

            echo "==> Restarting services..."
            docker compose -f docker-compose.deploy.yml --env-file .env up -d --remove-orphans

            echo "==> Waiting for infrastructure to be healthy..."
            sleep 15

            echo "==> Service status:"
            docker compose -f docker-compose.deploy.yml --env-file .env ps

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy complete!"
